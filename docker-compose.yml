# docker-compose.yml (frontend addition — merge with backend compose)
services:
  web:
    build:
      context: ./rentos-web
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      NEXT_PUBLIC_API_URL: http://app:3000 # internal Docker network
    depends_on:
      - app
    restart: unless-stopped
